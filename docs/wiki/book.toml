[book]
title = "ndn-rs Wiki"
authors = ["ndn-rs contributors"]
language = "en"
src = "src"

[build]
build-dir = "../../target/wiki"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/Quarmire/ndn-rs"
edit-url-template = "https://github.com/Quarmire/ndn-rs/edit/main/docs/wiki/{path}"
additional-js = ["mermaid-init.js", "d3graph-init.js"]

[output.html.fold]
enable = true
level = 1

[preprocessor.mermaid]
command = "mdbook-mermaid"
