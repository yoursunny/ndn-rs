[package]
name = "ndn-packet"
description = "NDN packet types: Name, Interest, Data, Nack"
version.workspace = true
edition.workspace = true
license.workspace = true

# `std` is NOT enabled by default. Bare-metal / no_std targets use this crate
# without any features. All other targets should enable the `std` feature:
#
#   ndn-packet = { ..., features = ["std"] }
#
# NOTE: this changed from `default = ["std"]` in v0.1.0-alpha. Crates that
# relied on the old default must now add `features = ["std"]` explicitly.
[features]
default = []
std     = ["ndn-tlv/std", "bytes/std", "dep:ring"]

[dependencies]
ndn-tlv  = { workspace = true, default-features = false }
bytes    = { workspace = true }
smallvec = { workspace = true }
ring     = { workspace = true, optional = true }

[dev-dependencies]
criterion = { workspace = true }
ndn-tlv       = { workspace = true, features = ["std"] }

[[bench]]
name    = "name"
harness = false
