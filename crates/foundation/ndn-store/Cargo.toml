[package]
name = "ndn-store"
description = "NDN forwarding tables: NameTrie, PIT, and ContentStore"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
default = []
fjall = ["dep:fjall"]

[dependencies]
ndn-packet = { workspace = true, features = ["std"] }
bytes         = { workspace = true, features = ["std"] }
smallvec   = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
dashmap = { workspace = true }
lru        = { workspace = true }
ring       = { workspace = true }
thiserror  = { workspace = true }
fjall      = { workspace = true, optional = true }

[dev-dependencies]
ndn-tlv       = { workspace = true, features = ["std"] }
tokio    = { workspace = true, features = ["rt", "macros"] }
fjall    = { workspace = true }
tempfile = "3"
criterion = { workspace = true }
ndn-packet = { workspace = true, features = ["std"] }

[[bench]]
name    = "lru"
harness = false

[[bench]]
name    = "sharded"
harness = false

[[bench]]
name              = "fjall"
harness           = false
required-features = ["fjall"]
