[package]
name = "ndn-wasm"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "WebAssembly simulation bindings for ndn-rs: in-browser NDN pipeline and topology"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen  = "0.2"
js-sys        = "0.3"
serde         = { workspace = true }
serde_json    = { workspace = true }
serde-wasm-bindgen = "0.6"
ndn-tlv       = { workspace = true, features = ["std"] }
ndn-packet    = { workspace = true, default-features = false }

[target.'cfg(target_arch = "wasm32")'.dependencies]
# wasm-bindgen-futures and gloo-timers for delayed delivery in topology
wasm-bindgen-futures = "0.4"
gloo-timers          = { version = "0.3", features = ["futures"] }

[dev-dependencies]
wasm-bindgen-test = "0.3"
