[package]
name = "ndn-filestore"
description = "NDN File Transfer Protocol — library for hosting and fetching named files over NDN"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
ndn-app        = { workspace = true }
ndn-ipc        = { workspace = true }
ndn-packet     = { workspace = true, features = ["std"] }
ndn-security   = { workspace = true }
ndn-config     = { workspace = true }
bytes          = { workspace = true, features = ["std"] }
tokio          = { workspace = true, features = ["rt", "macros", "fs", "sync", "time", "io-util"] }
anyhow         = { workspace = true }
serde          = { workspace = true }
serde_json     = { workspace = true }
sha2           = { workspace = true }
tracing        = { workspace = true }
mime_guess     = "2"
dirs-next      = "2"
