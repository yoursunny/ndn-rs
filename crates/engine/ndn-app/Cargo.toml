[package]
name = "ndn-app"
description = "NDN application API: Consumer, Producer, KeyChain, AppFace"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
default = []
blocking = ["tokio/rt"]

[dependencies]
ndn-packet     = { workspace = true, features = ["std"] }
ndn-engine     = { workspace = true }
ndn-security   = { workspace = true }
ndn-transport  = { workspace = true }
ndn-faces     = { workspace = true }
ndn-ipc        = { workspace = true }
ndn-sync       = { workspace = true }
bytes         = { workspace = true, features = ["std"] }
tokio          = { workspace = true, features = ["sync", "rt", "time"] }
tokio-util     = { workspace = true }
tracing        = { workspace = true }
thiserror      = { workspace = true }

[dev-dependencies]
ndn-tlv       = { workspace = true, features = ["std"] }
tokio   = { workspace = true, features = ["rt", "macros"] }
