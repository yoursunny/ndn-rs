[package]
name = "ndn-security"
description = "NDN security: signing, verification, trust schema, and certificate management"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
ndn-packet    = { workspace = true, features = ["std"] }
ndn-tlv       = { workspace = true, features = ["std"] }
bytes         = { workspace = true, features = ["std"] }
dashmap       = { workspace = true }
thiserror     = { workspace = true }
ring          = { workspace = true }
# SQLite for the ndn-cxx-compatible pib-sqlite3 backend. `bundled` builds
# SQLite from source (~5 s) so we don't depend on a system library, which
# matters for cross-compilation to Android, iOS, musl, and bare-metal.
rusqlite      = { version = "0.32", features = ["bundled"], optional = true }
ed25519-dalek = { workspace = true }
blake3        = { workspace = true }
# DID support (formerly ndn-did)
serde         = { workspace = true }
serde_json    = { workspace = true }
base64        = { workspace = true }
futures       = { workspace = true }

tokio         = { workspace = true, features = ["sync", "time", "rt"] }

# Optional hardware key storage via YubiKey PIV (feature: yubikey-piv).
# Requires pcscd and a connected YubiKey.
yubikey = { version = "0.8", optional = true }

[features]
default     = ["sqlite-pib"]
yubikey-piv = ["dep:yubikey"]
# SQLite-backed PIB compatible with ndn-cxx pib-sqlite3 (default-on so
# existing builds get the new backend without flag changes). Pulls in
# rusqlite with the `bundled` feature so SQLite is built from source —
# no system libsqlite3 required, identical behaviour on every target.
sqlite-pib  = ["dep:rusqlite"]

[dev-dependencies]
tokio      = { workspace = true, features = ["rt", "macros", "sync", "time"] }
tempfile   = "3"
criterion  = { workspace = true }
ndn-tlv       = { workspace = true, features = ["std"] }
# Pure-Rust SHA-256 with the asm/SIMD backend explicitly disabled, used
# only by the bench harness so we can compare against ring's hardware
# (SHA-NI on x86_64, ARMv8 crypto extensions on aarch64) accelerated path.
# `default-features = false` drops the asm feature; the resulting backend
# is the rustcrypto soft path with no CPU-extension dispatch.
sha2       = { version = "0.10", default-features = false }

[[bench]]
name    = "security"
harness = false
