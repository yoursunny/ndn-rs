<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ndn-rs Explorer</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/engine-view.css">
</head>
<body>
  <nav>
    <span class="logo">ndn-rs</span>
    <div class="nav-links">
      <button class="nav-btn active" data-view="layer-map">Layers</button>
      <button class="nav-btn" data-view="engine-view">Engine</button>
      <button class="nav-btn" data-view="dep-graph">2D Graph</button>
      <button class="nav-btn" data-view="pipeline-trace">Pipeline</button>
      <button class="nav-btn" data-view="packet-explorer">Packets</button>
      <button class="nav-btn" data-view="topology">Topology</button>
      <button class="nav-btn" data-view="security">Security</button>
      <button class="nav-btn" data-view="tour">Tour</button>
    </div>
    <a class="nav-wiki-link" href="../wiki/" target="_blank" rel="noopener" title="Open the ndn-rs wiki">Wiki ↗</a>
    <span id="wasm-badge" class="wasm-badge" title="WASM status">WASM —</span>
    <button id="theme-toggle" class="theme-toggle-btn" title="Toggle dark / light mode" aria-label="Toggle theme">☀</button>
    <input type="text" id="search-box" placeholder="Search crates, types...  ( / )">
  </nav>
  <main>
    <div id="layer-map" class="view active"></div>
    <div id="engine-view" class="view"></div>
    <div id="crate-detail" class="view"></div>
    <div id="type-detail" class="view"></div>
    <div id="dep-graph" class="view"></div>
    <div id="pipeline-trace" class="view"></div>
    <div id="packet-explorer" class="view"></div>
    <div id="topology" class="view"></div>
    <div id="security" class="view"></div>
    <div id="search" class="view"></div>
    <div id="tour" class="view"></div>
  </main>
  <script type="module" src="js/app.js"></script>
</body>
</html>
