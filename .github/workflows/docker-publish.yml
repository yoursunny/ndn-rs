name: Docker — publish ndn-fwd

on:
  push:
    branches: [main]
    paths:
      - "binaries/ndn-fwd/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/docker-publish.yml"
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ndn-fwd

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # latest=auto: metadata-action emits `:latest` automatically on
          # semver tag pushes. Combined with the `latest` raw tag below, main
          # also publishes `:latest` so a bare `docker pull ghcr.io/.../ndn-fwd`
          # (which defaults to `:latest`) works pre-release. Once a release
          # tag is pushed, `:latest` shifts to that semver build.
          flavor: |
            latest=auto
          tags: |
            # tag each release as vX.Y.Z and vX.Y and vX
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # tag main branch as `edge` and also as `latest` so bare
            # `docker pull` works before any semver release exists
            type=edge,branch=main
            type=raw,value=latest,enable={{is_default_branch}}
            # always include the full commit SHA
            type=sha,format=long

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: binaries/ndn-fwd/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
