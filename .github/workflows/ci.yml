name: CI — core

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - "crates/foundation/**"
      - "crates/engine/**"
      - "crates/faces/**"
      - "crates/protocols/**"
      - "crates/sim/**"
      - "crates/platform/**"
      - "binaries/**"
      - "tools/**"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "crates/foundation/**"
      - "crates/engine/**"
      - "crates/faces/**"
      - "crates/protocols/**"
      - "crates/sim/**"
      - "crates/platform/**"
      - "binaries/**"
      - "tools/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  core:
    name: Core (fmt / clippy / test / doc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-core-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-core-

      # ndn-dashboard uses Dioxus desktop which requires WebKit2GTK on Linux.
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            pkg-config

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: >
          cargo clippy
          --workspace
          --exclude ndn-strategy-wasm
          --exclude ndn-research
          --exclude ndn-compute
          --exclude ndn-python
          -- -D warnings

      - name: Test
        run: >
          cargo test
          --workspace
          --exclude ndn-strategy-wasm
          --exclude ndn-research
          --exclude ndn-compute
          --exclude ndn-python

      - name: Doc build
        run: >
          cargo doc
          --workspace
          --exclude ndn-strategy-wasm
          --exclude ndn-research
          --exclude ndn-compute
          --exclude ndn-python
          --no-deps
