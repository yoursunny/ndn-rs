name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Core library ─────────────────────────────────────────────────────────────
  # Always runs. Covers the publishable crate stack: tlv → packet → transport →
  # store → pipeline → strategy → security → engine → app → ipc → config →
  # discovery → face-net → face-local → face-serial → sync → sim → embedded.
  core:
    name: Core (fmt / clippy / test / doc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-core-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-core-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint (core)
        run: >
          cargo clippy
          --workspace
          --exclude ndn-face-l2
          --exclude ndn-strategy-wasm
          --exclude ndn-research
          --exclude ndn-compute
          --exclude ndn-python
          -- -D warnings

      - name: Test (core)
        run: >
          cargo test
          --workspace
          --exclude ndn-face-l2
          --exclude ndn-strategy-wasm
          --exclude ndn-research
          --exclude ndn-compute
          --exclude ndn-python

      - name: Doc build (core)
        run: >
          cargo doc
          --workspace
          --exclude ndn-face-l2
          --exclude ndn-strategy-wasm
          --exclude ndn-research
          --exclude ndn-compute
          --exclude ndn-python
          --no-deps

  # ── ndn-face-l2 (Linux-only: AF_PACKET, pcap, Bluetooth) ────────────────────
  face-l2:
    name: face-l2 (Linux only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-l2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-l2-

      - name: Install libpcap
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Lint (face-l2)
        run: cargo clippy -p ndn-face-l2 -- -D warnings

      - name: Test (face-l2)
        run: cargo test -p ndn-face-l2

      - name: Doc build (face-l2)
        run: cargo doc -p ndn-face-l2 --no-deps

  # ── Research extensions (WASM strategy, compute, research) ──────────────────
  research:
    name: Research extensions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-research-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-research-

      - name: Install Wasmtime CLI (for WASM strategy tests)
        run: curl https://wasmtime.dev/install.sh -sSf | bash || true

      - name: Lint (research)
        run: >
          cargo clippy
          -p ndn-strategy-wasm
          -p ndn-research
          -p ndn-compute
          -- -D warnings

      - name: Test (research)
        run: >
          cargo test
          -p ndn-strategy-wasm
          -p ndn-research
          -p ndn-compute

      - name: Doc build (research)
        run: >
          cargo doc
          -p ndn-strategy-wasm
          -p ndn-research
          -p ndn-compute
          --no-deps

  # ── Python bindings ──────────────────────────────────────────────────────────
  python:
    name: Python bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-python-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-python-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install maturin
        run: pip install maturin

      - name: Lint (ndn-python)
        run: cargo clippy -p ndn-python -- -D warnings

      - name: Build wheel (ndn-python)
        run: maturin build -m bindings/ndn-python/Cargo.toml

      - name: Doc build (ndn-python)
        run: cargo doc -p ndn-python --no-deps
