name: Wiki + Explorer

on:
  push:
    branches: [main]
    paths:
      - 'docs/wiki/**'
      - 'tools/ndn-explorer/**'
      - 'crates/**'
      - 'binaries/**'
      - '.github/workflows/wiki.yml'
  # Re-deploy after the benchmark workflow commits updated results to docs/wiki/.
  # GITHUB_TOKEN commits do not trigger push events, so we chain via workflow_run.
  workflow_run:
    workflows: ["benchmarks"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    # When triggered by workflow_run, only proceed if benchmarks succeeded.
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Rust / WASM setup ─────────────────────────────────────────────────────
      - name: Install Rust toolchain (stable + wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry and build output
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/wasm32-unknown-unknown
          key: ${{ runner.os }}-wasm-${{ hashFiles('crates/ndn-wasm/**', 'crates/ndn-tlv/**', 'crates/ndn-packet/**', 'Cargo.lock') }}
          restore-keys: ${{ runner.os }}-wasm-

      - name: Cache cargo doc build artifacts
        uses: actions/cache@v4
        with:
          path: |
            target/debug
            target/doc
          key: ${{ runner.os }}-doc-${{ hashFiles('Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-doc-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build ndn-wasm
        id: wasm_build
        continue-on-error: true   # site still deploys with JS fallback if this fails
        run: |
          wasm-pack build crates/ndn-wasm \
            --target web \
            --out-dir "$PWD/tools/ndn-explorer/wasm" \
            --out-name ndn_wasm \
            --no-typescript \
            --release
          echo "built=true" >> "$GITHUB_OUTPUT"

      - name: Report WASM build status
        run: |
          if [ "${{ steps.wasm_build.outputs.built }}" = "true" ]; then
            echo "✓ ndn-wasm built — WASM simulation will be active in the Explorer"
            ls -lh tools/ndn-explorer/wasm/
          else
            echo "⚠ ndn-wasm build failed — Explorer will use JS fallback simulation"
          fi

      # ── API docs (cargo doc) ──────────────────────────────────────────────────
      - name: Build API docs
        id: docs_build
        continue-on-error: true   # site still deploys without docs if this fails
        run: |
          cargo doc --workspace --no-deps 2>&1 | tail -10
          # Create a root index that lists all documented crates
          cat > target/doc/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>ndn-rs API Docs</title>
            <style>
              :root { color-scheme: dark; }
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                background: #0d1117; color: #e6edf3;
                padding: 2rem; max-width: 900px; margin: 0 auto;
              }
              h1 { color: #58a6ff; margin-bottom: 0.4rem; }
              .subtitle { color: #8b949e; margin-bottom: 2rem; font-size: 0.9rem; }
              h2 { color: #8b949e; font-size: 0.75rem; text-transform: uppercase;
                   letter-spacing: 0.08em; margin: 1.5rem 0 0.5rem; }
              .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.6rem; }
              a.crate {
                display: block; background: #161b22; border: 1px solid #30363d;
                border-radius: 8px; padding: 0.75rem 1rem; text-decoration: none;
                color: #e6edf3; transition: border-color 0.15s;
              }
              a.crate:hover { border-color: #58a6ff; }
              a.crate .name { color: #58a6ff; font-family: monospace; font-size: 0.9rem; }
              a.crate .desc { color: #8b949e; font-size: 0.78rem; margin-top: 0.25rem; }
              .back { color: #8b949e; font-size: 0.82rem; margin-bottom: 1.5rem; display: inline-block; }
              .back:hover { color: #58a6ff; }
            </style>
          </head>
          <body>
            <a class="back" href="../">← ndn-rs home</a>
            <h1>ndn-rs API Documentation</h1>
            <p class="subtitle">Generated by <code>cargo doc --workspace --no-deps</code></p>

            <h2>Foundation</h2>
            <div class="grid">
              <a class="crate" href="ndn_tlv/"><div class="name">ndn-tlv</div><div class="desc">TLV encoding/decoding primitives</div></a>
              <a class="crate" href="ndn_packet/"><div class="name">ndn-packet</div><div class="desc">Interest, Data, and Nack packet types</div></a>
              <a class="crate" href="ndn_store/"><div class="name">ndn-store</div><div class="desc">PIT, FIB, and Content Store traits</div></a>
              <a class="crate" href="ndn_transport/"><div class="name">ndn-transport</div><div class="desc">Face transport abstractions</div></a>
            </div>

            <h2>Faces</h2>
            <div class="grid">
              <a class="crate" href="ndn_face_net/"><div class="name">ndn-face-net</div><div class="desc">UDP and TCP faces</div></a>
              <a class="crate" href="ndn_face_local/"><div class="name">ndn-face-local</div><div class="desc">Local app-facing IPC</div></a>
              <a class="crate" href="ndn_face_l2/"><div class="name">ndn-face-l2</div><div class="desc">Raw Ethernet / L2 faces</div></a>
              <a class="crate" href="ndn_face_serial/"><div class="name">ndn-face-serial</div><div class="desc">Serial / UART faces</div></a>
            </div>

            <h2>Pipeline &amp; Strategy</h2>
            <div class="grid">
              <a class="crate" href="ndn_pipeline/"><div class="name">ndn-pipeline</div><div class="desc">Packet processing pipeline stages</div></a>
              <a class="crate" href="ndn_strategy/"><div class="name">ndn-strategy</div><div class="desc">Forwarding strategy framework</div></a>
              <a class="crate" href="ndn_security/"><div class="name">ndn-security</div><div class="desc">Signing and verification</div></a>
              <a class="crate" href="ndn_cert/"><div class="name">ndn-cert</div><div class="desc">NDN certificate / NDNCERT</div></a>
              <a class="crate" href="ndn_identity/"><div class="name">ndn-identity</div><div class="desc">Identity management</div></a>
              <a class="crate" href="ndn_did/"><div class="name">ndn-did</div><div class="desc">DID-over-NDN</div></a>
            </div>

            <h2>Engine &amp; App</h2>
            <div class="grid">
              <a class="crate" href="ndn_engine/"><div class="name">ndn-engine</div><div class="desc">Forwarder engine — start here</div></a>
              <a class="crate" href="ndn_app/"><div class="name">ndn-app</div><div class="desc">Application-side NDN API</div></a>
              <a class="crate" href="ndn_ipc/"><div class="name">ndn-ipc</div><div class="desc">IPC management channel</div></a>
              <a class="crate" href="ndn_config/"><div class="name">ndn-config</div><div class="desc">Router configuration</div></a>
              <a class="crate" href="ndn_discovery/"><div class="name">ndn-discovery</div><div class="desc">Neighbour discovery protocols</div></a>
            </div>

            <h2>Simulation &amp; Research</h2>
            <div class="grid">
              <a class="crate" href="ndn_sim/"><div class="name">ndn-sim</div><div class="desc">Discrete-event simulator</div></a>
              <a class="crate" href="ndn_sync/"><div class="name">ndn-sync</div><div class="desc">Dataset synchronisation</div></a>
              <a class="crate" href="ndn_compute/"><div class="name">ndn-compute</div><div class="desc">In-network compute</div></a>
            </div>
          </body>
          </html>
          HTML
          echo "built=true" >> "$GITHUB_OUTPUT"

      - name: Report API docs build status
        run: |
          if [ "${{ steps.docs_build.outputs.built }}" = "true" ]; then
            echo "✓ cargo doc succeeded — API docs will be live at /api/"
            du -sh target/doc/ 2>/dev/null || true
          else
            echo "⚠ cargo doc failed — /api/ will show a placeholder page"
          fi

      - name: Install mdBook
        env:
          MDBOOK_VERSION: "0.5.2"
        run: |
          mkdir -p $HOME/.local/bin
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz -C $HOME/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install mdbook-mermaid
        env:
          MERMAID_VERSION: "0.17.0"
        run: |
          curl -sSL "https://github.com/badboy/mdbook-mermaid/releases/download/v${MERMAID_VERSION}/mdbook-mermaid-v${MERMAID_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar xz -C $HOME/.local/bin

      - name: Build wiki
        run: mdbook build docs/wiki

      # Assemble the site:
      #   /             → landing page
      #   /wiki/        → mdBook output
      #   /explorer/    → static explorer app
      - name: Assemble site
        run: |
          mkdir -p target/site
          cp -r target/wiki target/site/wiki
          cp -r tools/ndn-explorer target/site/explorer

          # API docs — copy if built, otherwise drop in a placeholder
          if [ "${{ steps.docs_build.outputs.built }}" = "true" ]; then
            cp -r target/doc target/site/api
          else
            mkdir -p target/site/api
            cat > target/site/api/index.html << 'PLACEHOLDER'
            <!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
            <title>API Docs — Build Pending</title>
            <style>body{font-family:sans-serif;background:#0d1117;color:#8b949e;display:flex;
            align-items:center;justify-content:center;min-height:100vh;margin:0}</style>
            </head><body><p>API documentation build failed or is pending. Check GitHub Actions.</p></body></html>
            PLACEHOLDER
          fi

          cat > target/site/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>ndn-rs</title>
            <style>
              :root { color-scheme: dark; }
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                background: #0d1117; color: #e6edf3;
                display: flex; flex-direction: column;
                align-items: center; justify-content: center;
                min-height: 100vh; gap: 2rem; padding: 2rem;
              }
              h1 { font-size: 2rem; color: #58a6ff; }
              p { color: #8b949e; max-width: 480px; text-align: center; line-height: 1.6; }
              .cards {
                display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center;
              }
              .card {
                background: #161b22; border: 1px solid #30363d; border-radius: 10px;
                padding: 1.5rem 2rem; text-decoration: none; color: inherit;
                transition: border-color 0.15s, transform 0.1s;
                min-width: 200px; text-align: center;
              }
              .card:hover { border-color: #58a6ff; transform: translateY(-2px); }
              .card-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
              .card h2 { font-size: 1.05rem; color: #58a6ff; margin-bottom: 0.3rem; }
              .card p { font-size: 0.82rem; color: #8b949e; margin: 0; }
              footer { font-size: 0.78rem; color: #8b949e; }
              footer a { color: #58a6ff; text-decoration: none; }
            </style>
          </head>
          <body>
            <div>
              <h1>ndn-rs</h1>
              <p style="margin-top:0.5rem">Named Data Networking forwarder stack in Rust</p>
            </div>
            <div class="cards">
              <a class="card" href="explorer/">
                <div class="card-icon">🗺️</div>
                <h2>Explorer</h2>
                <p>Interactive crate map, dependency graph, and pipeline trace</p>
              </a>
              <a class="card" href="wiki/">
                <div class="card-icon">📖</div>
                <h2>Wiki</h2>
                <p>Architecture deep-dives, design decisions, and guides</p>
              </a>
              <a class="card" href="api/">
                <div class="card-icon">📚</div>
                <h2>API Docs</h2>
                <p>Rust crate documentation generated by cargo doc</p>
              </a>
              <a class="card" href="https://github.com/Quarmire/ndn-rs" target="_blank" rel="noopener">
                <div class="card-icon">⚙️</div>
                <h2>Source</h2>
                <p>Browse the repository on GitHub</p>
              </a>
            </div>
            <footer>
              <a href="https://github.com/Quarmire/ndn-rs">github.com/Quarmire/ndn-rs</a>
            </footer>
          </body>
          </html>
          HTML

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
